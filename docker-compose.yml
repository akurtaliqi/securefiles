services:
  clamav:
    image: clamav/clamav:latest
    container_name: clamav-server
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      - CLAMAV_DB_DIR=/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo PING | nc -w 2 127.0.0.1 3310 | grep -q PONG'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - securefiles-network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - securefiles-network

  backend:
    build:
      context: ./backend
    container_name: securefiles-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - ANTIVIRUS_CLAMAV_HOST=clamav
      - ANTIVIRUS_CLAMAV_PORT=3310
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    volumes:
      - backend_data:/app/data
    depends_on:
      clamav:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - securefiles-network

  frontend:
    build:
      context: ./frontend
    container_name: securefiles-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - securefiles-network

volumes:
  clamav_data:
  minio_data:
  backend_data:

networks:
  securefiles-network:
    driver: bridge