spring:
  application:
    name: securefiles
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

file:
  storage:
    path: /data/uploads
